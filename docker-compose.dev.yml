# Dev overlay for docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up
#
# Or via the Makefile:
#   make dev / make up-dev / make rebuild-dev
#
# This file overlays `api` and `frontend` to bind-mount their *source* (not
# their installed dependencies) so host edits hot-reload in the container,
# while the build-time-installed artifact (pip wheel / node_modules) baked
# into the image stays authoritative. A dependency change therefore means
# rebuilding the image (`make rebuild-dev`) — exactly like production. The
# base docker-compose.yml is unchanged and used as-is in production.
services:
  api:
    volumes:
      - libreta-data:/var/lib/libreta
      - ./backend/src:/app/src
    # PYTHONPATH puts the bind-mounted source ahead of the baked-in site-packages
    # copy, so edits on the host take effect on reload. The base Dockerfile
    # `pip install`s the package at build time so the wheel is also present and
    # we can ship the prod image unchanged.
    environment:
      PYTHONPATH: /app/src
    command:
      [
        "uvicorn",
        "libreta.main:app",
        "--reload",
        "--reload-dir",
        "/app/src",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]

  # Bind-mount frontend *source* (never node_modules) over the image, so host
  # edits hot-reload via Vite while the image's installed deps stay
  # authoritative. Same contract as the api overlay above.
  frontend:
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/eslint.config.js:/app/eslint.config.js
