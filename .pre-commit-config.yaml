repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/src/
        args: [--strict, --config-file=backend/pyproject.toml]
        additional_dependencies:
          - "fastapi>=0.115"
          - "pydantic>=2.9"
          - "pydantic-settings>=2.6"
          - "python-frontmatter>=1.1"

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: bash -c 'cd frontend && pnpm exec prettier --write "$@"' --
        files: ^frontend/src/.*\.(ts|vue|css)$

      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && pnpm exec eslint --fix "$@"' --
        files: ^frontend/src/.*\.(ts|vue)$
