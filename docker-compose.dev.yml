# Dev overlay for docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up
#
# Or via the Makefile:
#   make dev / make up-dev / make rebuild-dev
#
# This file overlays `api` to bind-mount the source tree and run uvicorn with
# --reload, so backend edits hot-reload in the container exactly like the Vite
# dev server does for the frontend. The base docker-compose.yml is unchanged
# and is used as-is in production.
services:
  api:
    volumes:
      - ./data/content:/content
      - ./backend/src:/app/src
    # PYTHONPATH puts the bind-mounted source ahead of the baked-in site-packages
    # copy, so edits on the host take effect on reload. The base Dockerfile
    # `pip install`s the package at build time so the wheel is also present and
    # we can ship the prod image unchanged.
    environment:
      PYTHONPATH: /app/src
    command:
      [
        "uvicorn",
        "libreta.main:app",
        "--reload",
        "--reload-dir",
        "/app/src",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
