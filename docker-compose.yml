services:
  api:
    build: ./backend
    image: libreta-api:dev
    restart: unless-stopped
    environment:
      # Meta-store: watched-folder config, sources.json, search index.
      # Does NOT hold wiki content anymore — git sources do.
      LIBRETA_CONTENT_DIR: /var/lib/libreta/meta
      LIBRETA_REPOS_DIR: /var/lib/libreta/repos
      LIBRETA_SSH_KEYS_DIR: /var/lib/libreta/ssh_keys
      # Browser-facing URL — the SPA loads the drawio iframe directly from the
      # user's browser, so this must be reachable from the host, not the
      # libreta-data network. Use the published host port (8093 by default).
      LIBRETA_DRAWIO_URL: http://localhost:8093
    volumes:
      - libreta-data:/var/lib/libreta
      - /srv:/srv
      - '/srv/data:/srv/data'
    ports:
      - "8092:8080"
    depends_on:
      - drawio

  frontend:
    profiles: ["dev"]
    build: ./frontend
    image: libreta-frontend:dev
    environment:
      VITE_API_BASE: http://api:8080
      # Keep pnpm's content-addressable store out of the bind-mounted source
      # tree — without these the store ends up at frontend/.pnpm-store and
      # pollutes git status with thousands of files.
      PNPM_STORE_DIR: /pnpm-store
      PNPM_HOME: /pnpm-home
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - pnpm-store:/pnpm-store
    ports:
      - "8091:5173"
    depends_on:
      - api

  drawio:
    image: jgraph/drawio:latest
    restart: unless-stopped
    ports:
      - "8093:8080"

volumes:
  # Single named volume holds repos, ssh_keys, and meta.
  # Back up this volume to back up all cloned repos and key material.
  libreta-data:
  pnpm-store:
