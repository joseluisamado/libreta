<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Notebook cover -->
  <rect x="14" y="8" width="38" height="48" rx="3" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <!-- Spine / spiral binding holes -->
  <circle cx="22" cy="16" r="2" fill="#64748b"/>
  <circle cx="22" cy="24" r="2" fill="#64748b"/>
  <circle cx="22" cy="32" r="2" fill="#64748b"/>
  <circle cx="22" cy="40" r="2" fill="#64748b"/>
  <circle cx="22" cy="48" r="2" fill="#64748b"/>
  <!-- Page lines -->
  <line x1="30" y1="22" x2="44" y2="22" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="28" x2="44" y2="28" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="34" x2="40" y2="34" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pencil -->
  <g transform="translate(38, 38) rotate(45)">
    <rect x="0" y="-2.5" width="24" height="5" rx="1" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
    <polygon points="24,-2.5 28,0 24,2.5" fill="#f59e0b" stroke="#b45309" stroke-width="1"/>
    <polygon points="28,-1.5 31,0 28,1.5" fill="#1e293b" stroke="#0f172a" stroke-width="0.8"/>
  </g>
  <!-- Tiny star on cover -->
  <path d="M48 14l1.2 2.4 2.6.4-1.9 1.8.4 2.6-2.3-1.2-2.3 1.2.4-2.6-1.9-1.8 2.6-.4z" fill="#f59e0b"/>
</svg>
